<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keynote GIF Slide Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    header {
      width: 100%;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 14px 24px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e5e5e5;
      letter-spacing: -0.2px;
    }
    #loadAnotherBtn {
      position: absolute;
      right: 24px;
      padding: 5px 12px;
      font-size: 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #999;
    }
    #loadAnotherBtn:hover {
      background: #222;
      color: #ccc;
    }

    /* Drop Zone */
    #dropZone {
      margin: 80px auto 0;
      width: 520px;
      max-width: 90vw;
      padding: 64px 40px;
      border: 2px dashed #333;
      border-radius: 12px;
      background: #111;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    #dropZone.highlight {
      border-color: #3b82f6;
      background: #0d1b2a;
    }
    #dropZone .icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    #dropZone .label {
      font-size: 15px;
      color: #999;
      line-height: 1.6;
    }
    #dropZone .label strong {
      color: #ccc;
    }
    #dropZone .sublabel {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    /* Hidden file input */
    #fileInput { display: none; }

    /* Canvas container */
    #canvasContainer {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin: 24px auto 0;
      padding: 0 16px;
    }
    #slideCanvas {
      width: 100%;
      height: auto;
      aspect-ratio: 1080 / 608;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      display: block;
    }

    /* Bottom bar / viewer controls */
    #viewer {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin: 16px auto 0;
      padding: 0 16px 32px;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #slideCounter {
      font-size: 13px;
      color: #999;
      min-width: 80px;
      text-align: center;
    }

    #dotStrip {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
      max-width: 100%;
      padding: 4px 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      border: none;
      padding: 0;
      margin: 0 2px;
      cursor: pointer;
      min-width: 8px;
      transition: background 0.1s;
    }
    .dot.active { background: #3b82f6; }
    .dot:hover { background: #555; }

    .keyboard-hint {
      font-size: 11px;
      color: #555;
    }

    /* Buttons */
    button {
      padding: 8px 16px;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.3; cursor: default; }

    /* Loading overlay */
    #loading {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 10, 0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #loadingText {
      font-size: 14px;
      color: #999;
    }
    .progress-bar {
      width: 280px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      transition: width 0.1s;
      width: 0%;
    }

    /* Warning / Error */
    #messageArea {
      display: none;
      margin: 24px auto 0;
      max-width: 520px;
      width: 90vw;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }
    #messageArea.warning {
      display: block;
      background: #2a1f00;
      border: 1px solid #665200;
      color: #fbbf24;
    }
    #messageArea.error {
      display: block;
      background: #1f0000;
      border: 1px solid #660000;
      color: #ef4444;
    }
  </style>
</head>
<body>

  <header>
    <h1>Keynote GIF Slide Viewer</h1>
    <button id="loadAnotherBtn" style="display:none;" onclick="loadAnother()">Load Another GIF</button>
  </header>

  <!-- Drop Zone -->
  <div id="dropZone">
    <div class="icon">📁</div>
    <div class="label">
      <strong>Drop a GIF file here</strong><br>
      or click to browse
    </div>
    <div class="sublabel">Keynote-exported animated GIFs up to 200 MB</div>
  </div>
  <input type="file" id="fileInput" accept=".gif">

  <!-- Message area for warnings/errors -->
  <div id="messageArea"></div>

  <!-- Canvas container (hidden until GIF loaded) -->
  <div id="canvasContainer">
    <canvas id="slideCanvas" width="1080" height="608"></canvas>
  </div>

  <!-- Bottom bar / viewer controls (hidden until GIF loaded) -->
  <div id="viewer">
    <div class="controls-row">
      <button id="prevBtn" disabled>&#9664; Previous</button>
      <span id="slideCounter">Slide 0 / 0</span>
      <button id="nextBtn" disabled>Next &#9654;</button>
    </div>
    <div id="dotStrip"></div>
    <div class="keyboard-hint">Arrow keys: Previous / Next</div>
  </div>

  <!-- Loading overlay (hidden until file is being processed) -->
  <div id="loading">
    <div id="loadingText">Loading...</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <script>
    // ── State ──
    let gifBuffer = null;
    let parsedData = null;
    let slideMap = null;
    let currentSlideIndex = 0;
    let isPlaying = false;

    // ── DOM refs ──
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const canvasContainer = document.getElementById('canvasContainer');
    const viewer = document.getElementById('viewer');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const progressFill = document.getElementById('progressFill');
    const messageArea = document.getElementById('messageArea');

    // ── Helpers ──

    function showWarning(msg) {
      messageArea.className = 'warning';
      messageArea.textContent = msg;
      messageArea.style.display = 'block';
    }

    function showError(msg) {
      messageArea.className = 'error';
      messageArea.textContent = msg;
      messageArea.style.display = 'block';
    }

    function clearMessages() {
      messageArea.style.display = 'none';
      messageArea.className = '';
      messageArea.textContent = '';
    }

    function updateProgress(text, percent) {
      loadingText.textContent = text;
      progressFill.style.width = percent + '%';
    }

    // ── Prevent default drag on document ──
    document.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
    document.addEventListener('drop', (e) => { e.preventDefault(); e.stopPropagation(); });

    // ── Drop zone events ──
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.add('highlight');
    });

    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('highlight');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('highlight');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    // ── Click to browse ──
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    // ── File handling ──
    function handleFile(file) {
      clearMessages();

      // Check extension
      if (!file.name.toLowerCase().endsWith('.gif')) {
        showError('Please select a GIF file. Got: ' + file.name);
        return;
      }

      // Check size (200 MB limit)
      const MAX_SIZE = 200 * 1024 * 1024;
      if (file.size > MAX_SIZE) {
        showError('File too large (' + (file.size / (1024 * 1024)).toFixed(1) + ' MB). Maximum is 200 MB.');
        return;
      }

      // Read file
      const reader = new FileReader();
      reader.onload = function(e) {
        const buffer = e.target.result;

        // Validate GIF magic bytes
        const header = new Uint8Array(buffer, 0, 6);
        const magic = String.fromCharCode(...header);
        if (magic !== 'GIF87a' && magic !== 'GIF89a') {
          showError('Invalid GIF file. Header: ' + magic);
          return;
        }

        gifBuffer = buffer;

        // Show loading, hide drop zone
        dropZone.style.display = 'none';
        loading.style.display = 'flex';
        updateProgress('Preparing to parse...', 0);

        // Hand off to parser
        try {
          loadAndParseGIF(gifBuffer).then(result => {
            parsedData = result;
            slideMap = result.slides;
            initViewer();
          }).catch(err => {
            loading.style.display = 'none';
            dropZone.style.display = '';
            showError('Failed to parse GIF: ' + err.message);
            console.error(err);
          });
        } catch (err) {
          loading.style.display = 'none';
          dropZone.style.display = '';
          showError('Failed to parse GIF: ' + err.message);
          console.error(err);
        }
      };

      reader.onerror = function() {
        showError('Failed to read file: ' + reader.error.message);
      };

      reader.readAsArrayBuffer(file);
    }

    // ── GIF Parser + Slide Detection ──
    async function loadAndParseGIF(arrayBuffer) {
      updateProgress('Parsing GIF structure...', 0);
      const gif = gifuct.parseGIF(arrayBuffer);
      const rawFrames = gifuct.decompressFrames(gif, true);

      if (!rawFrames || rawFrames.length === 0) {
        throw new Error('No image frames found in GIF.');
      }

      const gifWidth = gif.lsd.width;
      const gifHeight = gif.lsd.height;
      const frameDelay = rawFrames[0]?.delay || 40;

      // Compositing canvas (handles disposal, positioning)
      const compCanvas = document.createElement('canvas');
      compCanvas.width = gifWidth;
      compCanvas.height = gifHeight;
      const compCtx = compCanvas.getContext('2d');

      // Temp canvas for patches
      const tempCanvas = document.createElement('canvas');
      const tempCtx = tempCanvas.getContext('2d');

      // Sample points for diff detection (~1000 points on a grid)
      const samplePoints = [];
      const gridSize = Math.ceil(Math.sqrt(1000));
      const stepX = Math.floor(gifWidth / gridSize);
      const stepY = Math.floor(gifHeight / gridSize);
      for (let y = 0; y < gifHeight; y += stepY) {
        for (let x = 0; x < gifWidth; x += stepX) {
          samplePoints.push(x, y); // flat array for speed
        }
      }

      const frames = []; // ImageBitmaps
      const diffs = [0]; // First frame has no diff
      let prevSamples = null;
      const totalFrames = rawFrames.length;

      for (let i = 0; i < totalFrames; i++) {
        const frame = rawFrames[i];

        // Handle disposal
        if (frame.disposalType === 2) {
          compCtx.clearRect(0, 0, gifWidth, gifHeight);
        }

        // Draw patch to temp canvas, composite onto full canvas
        const dims = frame.dims;
        tempCanvas.width = dims.width;
        tempCanvas.height = dims.height;
        const imageData = tempCtx.createImageData(dims.width, dims.height);
        imageData.data.set(frame.patch);
        tempCtx.putImageData(imageData, 0, 0);
        compCtx.drawImage(tempCanvas, dims.left, dims.top);

        // BEFORE converting to ImageBitmap: sample pixels for diff detection
        const fullImageData = compCtx.getImageData(0, 0, gifWidth, gifHeight);
        const pixels = fullImageData.data;

        // Sample current frame at grid points
        const currentSamples = new Uint8Array(samplePoints.length / 2 * 3);
        for (let s = 0; s < samplePoints.length; s += 2) {
          const idx = (samplePoints[s + 1] * gifWidth + samplePoints[s]) * 4;
          const si = (s / 2) * 3;
          currentSamples[si] = pixels[idx];
          currentSamples[si + 1] = pixels[idx + 1];
          currentSamples[si + 2] = pixels[idx + 2];
        }

        if (prevSamples) {
          let totalDiff = 0;
          for (let s = 0; s < currentSamples.length; s++) {
            totalDiff += Math.abs(currentSamples[s] - prevSamples[s]);
          }
          diffs.push(totalDiff / currentSamples.length);
        }
        prevSamples = currentSamples;

        // NOW convert to ImageBitmap (GPU-friendly, smaller than raw RGBA)
        const bitmap = await createImageBitmap(compCanvas);
        frames.push(bitmap);

        // Free the raw patch data
        frame.patch = null;

        // Progress update every 20 frames
        if (i % 20 === 0) {
          updateProgress(`Parsing frame ${i + 1} of ${totalFrames}...`, Math.round((i / totalFrames) * 100));
          await new Promise(r => setTimeout(r, 0)); // yield to UI
        }
      }

      // Slide detection: find "quiet runs" — sequences of consecutive frames
      // where diff is near zero. These are the actual slide holds.
      // Everything between quiet runs is a transition.
      // This handles both gradual dissolves and hard cuts correctly.
      const QUIET_THRESHOLD = 0.3; // max diff to count as "quiet" (no change)
      const MIN_QUIET_RUN = 8;     // minimum frames for a valid slide hold (~0.3 sec)

      // Find all quiet runs
      const allQuietRuns = [];
      let runStart = null;
      for (let i = 0; i < diffs.length; i++) {
        if (diffs[i] <= QUIET_THRESHOLD) {
          if (runStart === null) runStart = i;
        } else {
          if (runStart !== null && (i - runStart) >= MIN_QUIET_RUN) {
            allQuietRuns.push({ start: runStart, end: i - 1, length: i - runStart });
          }
          runStart = null;
        }
      }
      // Close final run
      if (runStart !== null && (diffs.length - runStart) >= MIN_QUIET_RUN) {
        allQuietRuns.push({ start: runStart, end: diffs.length - 1, length: diffs.length - runStart });
      }

      // Adaptive filtering: remove transition artifact "dark pauses" that
      // barely meet the minimum but are much shorter than real slide holds.
      let quietRuns = allQuietRuns;
      if (allQuietRuns.length >= 3) {
        const lengths = allQuietRuns.map(r => r.length).sort((a, b) => a - b);
        const median = lengths[Math.floor(lengths.length / 2)];
        const adaptiveMin = Math.max(MIN_QUIET_RUN, Math.floor(median * 0.5));
        quietRuns = allQuietRuns.filter(r => r.length >= adaptiveMin);
      }

      // Build slide map from quiet runs
      // Each quiet run is a slide. The gap between consecutive quiet runs is a transition.
      const slides = [];
      for (let i = 0; i < quietRuns.length; i++) {
        const run = quietRuns[i];
        const prevRun = i > 0 ? quietRuns[i - 1] : null;
        slides.push({
          restFrame: Math.floor((run.start + run.end) / 2),
          holdStart: run.start,
          holdEnd: run.end,
          transitionFrames: prevRun
            ? { start: prevRun.end + 1, end: run.start - 1 }
            : null
        });
      }

      // Fallback: if no slides found, treat entire GIF as one slide
      if (slides.length === 0) {
        slides.push({
          restFrame: 0,
          holdStart: 0,
          holdEnd: frames.length - 1,
          transitionFrames: null
        });
      }

      if (slides.length < 2) {
        showWarning('Could not detect slide boundaries. Try re-exporting with longer auto-advance timing (1-2 seconds).');
      }

      console.log(`Detected ${slides.length} slides from ${frames.length} frames`);
      console.log('Quiet runs:', quietRuns);
      console.log('Frame delay:', frameDelay);

      return { frames, slides, width: gifWidth, height: gifHeight, frameDelay };
    }

    // ── Viewer ──
    function initViewer() {
      // Hide loading, show viewer + load another button
      document.getElementById('loading').style.display = 'none';
      document.getElementById('viewer').style.display = 'flex';
      document.getElementById('canvasContainer').style.display = 'block';
      document.getElementById('loadAnotherBtn').style.display = 'block';

      // Set canvas dimensions
      const canvas = document.getElementById('slideCanvas');
      canvas.width = parsedData.width;
      canvas.height = parsedData.height;

      // Build dot strip (hide if only 1 slide)
      const dotStrip = document.getElementById('dotStrip');
      dotStrip.innerHTML = '';
      if (slideMap.length > 1) {
        dotStrip.style.display = 'flex';
        slideMap.forEach((slide, i) => {
          const dot = document.createElement('button');
          dot.className = 'dot';
          dot.title = `Slide ${i + 1}`;
          dot.onclick = () => jumpToSlide(i);
          dotStrip.appendChild(dot);
        });
      } else {
        dotStrip.style.display = 'none';
      }

      // Show first slide
      currentSlideIndex = 0;
      renderSlide(0);
      updateControls();
    }

    function renderSlide(index) {
      const canvas = document.getElementById('slideCanvas');
      const ctx = canvas.getContext('2d');
      const slide = slideMap[index];
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(parsedData.frames[slide.restFrame], 0, 0);
      currentSlideIndex = index;
      updateControls();
    }

    function updateControls() {
      document.getElementById('prevBtn').disabled = currentSlideIndex <= 0 || isPlaying;
      document.getElementById('nextBtn').disabled = currentSlideIndex >= slideMap.length - 1 || isPlaying;
      document.getElementById('slideCounter').textContent = `${currentSlideIndex + 1} of ${slideMap.length}`;

      // Update dots
      document.querySelectorAll('.dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === currentSlideIndex);
      });
    }

    // ── Playback ──
    function playNext() {
      if (isPlaying || currentSlideIndex >= slideMap.length - 1) return;

      const nextSlide = slideMap[currentSlideIndex + 1];
      if (!nextSlide.transitionFrames) {
        renderSlide(currentSlideIndex + 1);
        return;
      }

      isPlaying = true;
      updateControls();

      const { start, end } = nextSlide.transitionFrames;
      const canvas = document.getElementById('slideCanvas');
      const ctx = canvas.getContext('2d');
      let frameIdx = start;

      function playFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(parsedData.frames[frameIdx], 0, 0);
        frameIdx++;

        if (frameIdx <= end) {
          setTimeout(() => requestAnimationFrame(playFrame), parsedData.frameDelay);
        } else {
          isPlaying = false;
          renderSlide(currentSlideIndex + 1);
        }
      }

      requestAnimationFrame(playFrame);
    }

    function playPrev() {
      if (isPlaying || currentSlideIndex <= 0) return;
      renderSlide(currentSlideIndex - 1);
    }

    function jumpToSlide(index) {
      if (isPlaying) return;
      renderSlide(index);
    }

    // ── Wire buttons and keyboard ──
    document.getElementById('nextBtn').onclick = playNext;
    document.getElementById('prevBtn').onclick = playPrev;

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') playNext();
      if (e.key === 'ArrowLeft') playPrev();
    });

    // ── Load Another GIF ──
    function loadAnother() {
      // Release GPU memory from ImageBitmaps
      if (parsedData && parsedData.frames) {
        parsedData.frames.forEach(bmp => {
          if (bmp && typeof bmp.close === 'function') bmp.close();
        });
      }

      // Reset all state
      gifBuffer = null;
      parsedData = null;
      slideMap = null;
      currentSlideIndex = 0;
      isPlaying = false;

      // Hide viewer, show drop zone
      canvasContainer.style.display = 'none';
      viewer.style.display = 'none';
      document.getElementById('loadAnotherBtn').style.display = 'none';
      dropZone.style.display = '';
      clearMessages();

      // Reset file input so same file can be re-selected
      fileInput.value = '';
    }
  </script>

</body>
</html>
