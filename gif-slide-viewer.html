<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keynote GIF Slide Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    header {
      width: 100%;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 14px 24px;
      text-align: center;
    }
    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e5e5e5;
      letter-spacing: -0.2px;
    }

    /* Drop Zone */
    #dropZone {
      margin: 80px auto 0;
      width: 520px;
      max-width: 90vw;
      padding: 64px 40px;
      border: 2px dashed #333;
      border-radius: 12px;
      background: #111;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    #dropZone.highlight {
      border-color: #3b82f6;
      background: #0d1b2a;
    }
    #dropZone .icon {
      font-size: 40px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    #dropZone .label {
      font-size: 15px;
      color: #999;
      line-height: 1.6;
    }
    #dropZone .label strong {
      color: #ccc;
    }
    #dropZone .sublabel {
      font-size: 12px;
      color: #555;
      margin-top: 8px;
    }

    /* Hidden file input */
    #fileInput { display: none; }

    /* Canvas container */
    #canvasContainer {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin: 24px auto 0;
      padding: 0 16px;
    }
    #slideCanvas {
      width: 100%;
      height: auto;
      aspect-ratio: 1080 / 608;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      display: block;
    }

    /* Bottom bar / viewer controls */
    #viewer {
      display: none;
      width: 100%;
      max-width: 1080px;
      margin: 16px auto 0;
      padding: 0 16px 32px;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #slideCounter {
      font-size: 13px;
      color: #999;
      min-width: 80px;
      text-align: center;
    }

    #dotStrip {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 0;
      max-width: 100%;
      padding: 4px 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #333;
      border: none;
      padding: 0;
      margin: 0 2px;
      cursor: pointer;
      min-width: 8px;
      transition: background 0.1s;
    }
    .dot.active { background: #3b82f6; }
    .dot:hover { background: #555; }

    .keyboard-hint {
      font-size: 11px;
      color: #555;
    }

    /* Buttons */
    button {
      padding: 8px 16px;
      background: #222;
      border: 1px solid #333;
      border-radius: 6px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.3; cursor: default; }

    /* Loading overlay */
    #loading {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(10, 10, 10, 0.92);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    #loadingText {
      font-size: 14px;
      color: #999;
    }
    .progress-bar {
      width: 280px;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%;
      background: #3b82f6;
      transition: width 0.1s;
      width: 0%;
    }

    /* Warning / Error */
    #messageArea {
      display: none;
      margin: 24px auto 0;
      max-width: 520px;
      width: 90vw;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }
    #messageArea.warning {
      display: block;
      background: #2a1f00;
      border: 1px solid #665200;
      color: #fbbf24;
    }
    #messageArea.error {
      display: block;
      background: #1f0000;
      border: 1px solid #660000;
      color: #ef4444;
    }
  </style>
</head>
<body>

  <header>
    <h1>Keynote GIF Slide Viewer</h1>
  </header>

  <!-- Drop Zone -->
  <div id="dropZone">
    <div class="icon">📁</div>
    <div class="label">
      <strong>Drop a GIF file here</strong><br>
      or click to browse
    </div>
    <div class="sublabel">Keynote-exported animated GIFs up to 200 MB</div>
  </div>
  <input type="file" id="fileInput" accept=".gif">

  <!-- Message area for warnings/errors -->
  <div id="messageArea"></div>

  <!-- Canvas container (hidden until GIF loaded) -->
  <div id="canvasContainer">
    <canvas id="slideCanvas" width="1080" height="608"></canvas>
  </div>

  <!-- Bottom bar / viewer controls (hidden until GIF loaded) -->
  <div id="viewer">
    <div class="controls-row">
      <button id="prevBtn" disabled>&#9664; Previous</button>
      <span id="slideCounter">Slide 0 / 0</span>
      <button id="nextBtn" disabled>Next &#9654;</button>
    </div>
    <div id="dotStrip"></div>
    <div class="keyboard-hint">Arrow keys: Previous / Next</div>
  </div>

  <!-- Loading overlay (hidden until file is being processed) -->
  <div id="loading">
    <div id="loadingText">Loading...</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <script>
    // ── State ──
    let gifBuffer = null;

    // ── DOM refs ──
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const canvasContainer = document.getElementById('canvasContainer');
    const viewer = document.getElementById('viewer');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const progressFill = document.getElementById('progressFill');
    const messageArea = document.getElementById('messageArea');

    // ── Helpers ──

    function showWarning(msg) {
      messageArea.className = 'warning';
      messageArea.textContent = msg;
      messageArea.style.display = 'block';
    }

    function showError(msg) {
      messageArea.className = 'error';
      messageArea.textContent = msg;
      messageArea.style.display = 'block';
    }

    function clearMessages() {
      messageArea.style.display = 'none';
      messageArea.className = '';
      messageArea.textContent = '';
    }

    function updateProgress(text, percent) {
      loadingText.textContent = text;
      progressFill.style.width = percent + '%';
    }

    // ── Prevent default drag on document ──
    document.addEventListener('dragover', (e) => { e.preventDefault(); e.stopPropagation(); });
    document.addEventListener('drop', (e) => { e.preventDefault(); e.stopPropagation(); });

    // ── Drop zone events ──
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.add('highlight');
    });

    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('highlight');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      e.stopPropagation();
      dropZone.classList.remove('highlight');
      const files = e.dataTransfer.files;
      if (files.length > 0) handleFile(files[0]);
    });

    // ── Click to browse ──
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) handleFile(fileInput.files[0]);
    });

    // ── File handling ──
    function handleFile(file) {
      clearMessages();

      // Check extension
      if (!file.name.toLowerCase().endsWith('.gif')) {
        showError('Please select a GIF file. Got: ' + file.name);
        return;
      }

      // Check size (200 MB limit)
      const MAX_SIZE = 200 * 1024 * 1024;
      if (file.size > MAX_SIZE) {
        showError('File too large (' + (file.size / (1024 * 1024)).toFixed(1) + ' MB). Maximum is 200 MB.');
        return;
      }

      // Read file
      const reader = new FileReader();
      reader.onload = function(e) {
        const buffer = e.target.result;

        // Validate GIF magic bytes
        const header = new Uint8Array(buffer, 0, 6);
        const magic = String.fromCharCode(...header);
        if (magic !== 'GIF87a' && magic !== 'GIF89a') {
          showError('Invalid GIF file. Header: ' + magic);
          return;
        }

        gifBuffer = buffer;

        // Show loading, hide drop zone
        dropZone.style.display = 'none';
        loading.style.display = 'flex';
        updateProgress('Preparing to parse...', 0);

        // Hand off to parser
        loadAndParseGIF(gifBuffer);
      };

      reader.onerror = function() {
        showError('Failed to read file: ' + reader.error.message);
      };

      reader.readAsArrayBuffer(file);
    }

    // ── Stub: GIF parser (Task 2 will implement) ──
    function loadAndParseGIF(buffer) {
      console.log('Ready to parse', buffer.byteLength, 'bytes');
    }
  </script>

</body>
</html>
