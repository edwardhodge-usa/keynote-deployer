name: KeynoteDeployer
options:
  bundleIdPrefix: com.imaginelabstudios
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.40.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  KeynoteDeployer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Sparkle
        product: Sparkle
    configFiles:
      Debug: Sparkle.xcconfig
      Release: Sparkle.xcconfig
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Keynote Deployer
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright 2026 ImagineLab Studios"
        LSApplicationCategoryType: public.app-category.developer-tools
        SUFeedURL: $(SPARKLE_FEED_URL)
        SUPublicEDKey: $(SPARKLE_ED_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.keynote-deployer
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
