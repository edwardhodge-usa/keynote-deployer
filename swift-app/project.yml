name: KeynoteDeployer
options:
  bundleIdPrefix: com.imaginelabstudios
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.40.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  KeynoteDeployer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.keynote-deployer
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: "Keynote Deployer"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright 2026 ImagineLab Studios"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_SUFeedURL: "https://github.com/edwardhodge-usa/keynote-deployer/releases/latest/download/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: ""
