name: KeynoteDeployer
options:
  bundleIdPrefix: com.imaginelabstudios
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.3"
  minimumXcodeGenVersion: "2.40.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: "8RHA62T6FQ"

targets:
  KeynoteDeployer:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Sparkle
        product: Sparkle
    configFiles:
      Debug: Sparkle.xcconfig
      Release: Sparkle.xcconfig
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Keynote Deployer
        CFBundleShortVersionString: "1.0.4"
        CFBundleVersion: "1.0.4"
        NSHumanReadableCopyright: "Copyright 2026 ImagineLab Studios"
        LSApplicationCategoryType: public.app-category.developer-tools
        SUFeedURL: $(SPARKLE_FEED_URL)
        SUPublicEDKey: $(SPARKLE_ED_KEY)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.imaginelabstudios.keynote-deployer
        MARKETING_VERSION: "1.0.4"
        CURRENT_PROJECT_VERSION: "1.0.4"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          CODE_SIGN_STYLE: Automatic
          CODE_SIGNING_REQUIRED: "YES"
          CODE_SIGNING_ALLOWED: "YES"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application: Imaginelab Studios (8RHA62T6FQ)"
          CODE_SIGN_STYLE: Manual
          CODE_SIGNING_REQUIRED: "YES"
          CODE_SIGNING_ALLOWED: "YES"
          ENABLE_HARDENED_RUNTIME: "YES"
          CODE_SIGN_ENTITLEMENTS: "Sources/KeynoteDeployer.entitlements"
